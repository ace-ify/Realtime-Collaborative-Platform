<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-time Collaborative Sync Test</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            margin: 0;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            margin-bottom: 30px;
            color: #38bdf8;
        }
        .container {
            display: flex;
            gap: 40px;
            width: 100%;
            max-width: 1000px;
        }
        .editor-box {
            flex: 1;
            background-color: #1e293b;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #334155;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        h2 {
            margin-top: 0;
            font-size: 1.25rem;
            color: #e2e8f0;
            border-bottom: 1px solid #334155;
            padding-bottom: 10px;
        }
        textarea {
            width: 95%;
            height: 250px;
            background-color: #0f172a;
            color: #38bdf8;
            border: 1px solid #475569;
            border-radius: 8px;
            padding: 12px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1rem;
            resize: none;
            outline: none;
        }
        textarea:focus {
            border-color: #38bdf8;
        }
        .status {
            font-size: 0.85rem;
            margin-top: 10px;
            color: #94a3b8;
        }
        .connected {
            color: #4ade80;
        }
    </style>
</head>
<body>

    <h1>Real-time Collaborative Sync (Phase 1)</h1>
    
    <div class="container">
        <!-- CLIENT A -->
        <div class="editor-box">
            <h2>Client A</h2>
            <textarea id="editorA" placeholder="Type here as User A..."></textarea>
            <div class="status">Socket A: <span id="statusA" class="status-val">Connecting...</span></div>
        </div>

        <!-- CLIENT B -->
        <div class="editor-box">
            <h2>Client B</h2>
            <textarea id="editorB" placeholder="Type here as User B..."></textarea>
            <div class="status">Socket B: <span id="statusB" class="status-val">Connecting...</span></div>
        </div>
    </div>

    <script>
        const docId = "doc_test_123";
        const wsUrl = `ws://localhost:8000/ws/${docId}`;

        // Setup WebSocket for Client A
        const socketA = new WebSocket(wsUrl);
        const editorA = document.getElementById("editorA");
        const statusA = document.getElementById("statusA");

        socketA.onopen = () => {
            statusA.textContent = "Connected";
            statusA.classList.add("connected");
        };
        
        socketA.onmessage = (event) => {
            // Update editor A when B types
            editorA.value = event.data;
        };

        editorA.addEventListener("input", () => {
            // Send client A updates
            if (socketA.readyState === WebSocket.OPEN) {
                socketA.send(editorA.value);
            }
        });

        // Setup WebSocket for Client B
        const socketB = new WebSocket(wsUrl);
        const editorB = document.getElementById("editorB");
        const statusB = document.getElementById("statusB");

        socketB.onopen = () => {
            statusB.textContent = "Connected";
            statusB.classList.add("connected");
        };

        socketB.onmessage = (event) => {
            // Update editor B when A types
            editorB.value = event.data;
        };

        editorB.addEventListener("input", () => {
            // Send client B updates
            if (socketB.readyState === WebSocket.OPEN) {
                socketB.send(editorB.value);
            }
        });
    </script>
</body>
</html>
