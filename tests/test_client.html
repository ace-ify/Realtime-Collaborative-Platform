<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time CRDT Sync Test Harness</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f8fafc;
            color: #0f172a;
        }
        .code-font {
            font-family: 'JetBrains Mono', 'Courier New', Courier, monospace;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col py-12 px-6 max-w-5xl mx-auto">

    <!-- Minimal Header -->
    <header class="border-b border-slate-200 pb-6 mb-8 flex justify-between items-end">
        <div>
            <h1 class="text-xl font-bold tracking-tight text-slate-900">Real-Time CRDT Sync</h1>
            <p class="text-xs text-slate-500 mt-1">Multi-client state convergence & AI co-editing test harness</p>
        </div>
        <div class="text-right">
            <span class="text-[10px] uppercase font-semibold tracking-wider px-2.5 py-1 bg-slate-100 text-slate-600 rounded border border-slate-200/60 font-mono">
                Protocol: WS + Tagged Byteframes
            </span>
        </div>
    </header>

    <!-- Main Workspace -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
        
        <!-- CLIENT A: Alice -->
        <div class="flex flex-col">
            <div class="flex justify-between items-center mb-2 px-1">
                <div class="flex items-center space-x-2">
                    <span class="w-2 h-2 rounded-full bg-emerald-500"></span>
                    <span class="text-xs font-semibold text-slate-700">Client A (Alice)</span>
                </div>
                <span class="text-[10px] text-slate-400 font-mono" id="presenceA">Cursor: 0</span>
            </div>
            
            <textarea 
                id="editorA" 
                class="w-full h-72 bg-white text-slate-800 border border-slate-200 rounded-lg p-4 focus:ring-1 focus:ring-slate-400 focus:outline-none resize-none code-font text-sm shadow-sm"
                placeholder="Start typing as Alice..."></textarea>
            
            <!-- Presence Log -->
            <div class="mt-2 text-[11px] text-slate-400 font-mono" id="bobStatus">
                Bob is offline
            </div>
        </div>

        <!-- CLIENT B: Bob -->
        <div class="flex flex-col">
            <div class="flex justify-between items-center mb-2 px-1">
                <div class="flex items-center space-x-2">
                    <span class="w-2 h-2 rounded-full bg-emerald-500"></span>
                    <span class="text-xs font-semibold text-slate-700">Client B (Bob)</span>
                </div>
                <span class="text-[10px] text-slate-400 font-mono" id="presenceB">Cursor: 0</span>
            </div>
            
            <textarea 
                id="editorB" 
                class="w-full h-72 bg-white text-slate-800 border border-slate-200 rounded-lg p-4 focus:ring-1 focus:ring-slate-400 focus:outline-none resize-none code-font text-sm shadow-sm"
                placeholder="Start typing as Bob..."></textarea>
            
            <!-- Presence Log -->
            <div class="mt-2 text-[11px] text-slate-400 font-mono" id="aliceStatus">
                Alice is offline
            </div>
        </div>

    </div>

    <!-- AI Control Dashboard -->
    <div class="mt-8 border-t border-slate-200 pt-6">
        <h3 class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-3">AI Co-Editor Trigger</h3>
        
        <div class="flex gap-4 items-end max-w-2xl">
            <div class="flex-grow">
                <input 
                    type="text" 
                    id="aiPrompt" 
                    class="w-full bg-white border border-slate-200 rounded-lg px-3 py-2 text-xs text-slate-800 focus:outline-none focus:ring-1 focus:ring-slate-400 shadow-sm"
                    placeholder="Enter edit instruction..."
                    value="Change the word cold to warm">
            </div>
            <button 
                id="btnAI"
                class="py-2 px-4 bg-slate-900 hover:bg-slate-800 text-white rounded-lg text-xs font-medium transition-all shadow-sm active:scale-98">
                Trigger AI Edit
            </button>
        </div>
    </div>

    <!-- Script Block using Yjs ESM from CDN -->
    <script type="module">
        import * as Y from 'https://esm.sh/yjs@13.6.8';

        const DOC_ID = "visual_doc_123";
        const WS_URL = `ws://127.0.0.1:8000/ws/${DOC_ID}`;
        const HTTP_URL = `http://127.0.0.1:8000/documents/${DOC_ID}/ai-edit`;

        // Create independent YDocs for Alice and Bob
        const ydocA = new Y.Doc();
        const ytextA = ydocA.getText("text");

        const ydocB = new Y.Doc();
        const ytextB = ydocB.getText("text");

        // Select DOM Elements
        const elEditorA = document.getElementById("editorA");
        const elEditorB = document.getElementById("editorB");
        const elBtnAI = document.getElementById("btnAI");
        const elPrompt = document.getElementById("aiPrompt");

        const elAliceStatus = document.getElementById("aliceStatus");
        const elBobStatus = document.getElementById("bobStatus");

        // -------------------------------------------------------------
        // Setup WebSocket Connections
        // -------------------------------------------------------------
        const wsA = new WebSocket(WS_URL);
        const wsB = new WebSocket(WS_URL);

        wsA.binaryType = "arraybuffer";
        wsB.binaryType = "arraybuffer";

        // --- Client A Sync and Presence ---
        wsA.onmessage = (event) => {
            const buffer = new Uint8Array(event.data);
            const tag = buffer[0];
            const payload = buffer.slice(1);

            if (tag === 0) {
                // Apply update and tag it with wsA as origin to prevent echo loop
                Y.applyUpdate(ydocA, payload, wsA);
            } else if (tag === 1) {
                const presence = JSON.parse(new TextDecoder().decode(payload));
                if (presence.user === "Bob") {
                    elBobStatus.innerHTML = `Bob: active at index <b>${presence.cursor}</b>`;
                }
            }
        };

        ydocA.on('update', (update, origin) => {
            if (origin !== wsA) {
                const message = new Uint8Array(1 + update.length);
                message[0] = 0x00;
                message.set(update, 1);
                if (wsA.readyState === WebSocket.OPEN) {
                    wsA.send(message);
                }
            }
        });

        // --- Client B Sync and Presence ---
        wsB.onmessage = (event) => {
            const buffer = new Uint8Array(event.data);
            const tag = buffer[0];
            const payload = buffer.slice(1);

            if (tag === 0) {
                // Apply update and tag it with wsB as origin to prevent echo loop
                Y.applyUpdate(ydocB, payload, wsB);
            } else if (tag === 1) {
                const presence = JSON.parse(new TextDecoder().decode(payload));
                if (presence.user === "Alice") {
                    elAliceStatus.innerHTML = `Alice: active at index <b>${presence.cursor}</b>`;
                }
            }
        };

        ydocB.on('update', (update, origin) => {
            if (origin !== wsB) {
                const message = new Uint8Array(1 + update.length);
                message[0] = 0x00;
                message.set(update, 1);
                if (wsB.readyState === WebSocket.OPEN) {
                    wsB.send(message);
                }
            }
        });

        // -------------------------------------------------------------
        // Textarea Bindings (Observe and Sync typing events)
        // -------------------------------------------------------------
        let applyingA = false;
        ytextA.observe(() => {
            if (applyingA) return;
            elEditorA.value = ytextA.toString();
        });

        elEditorA.addEventListener('input', () => {
            applyingA = true;
            ydocA.transact(() => {
                ytextA.delete(0, ytextA.length);
                ytextA.insert(0, elEditorA.value);
            }); // REMOVED wsA to allow update trigger
            applyingA = false;
        });

        let applyingB = false;
        ytextB.observe(() => {
            if (applyingB) return;
            elEditorB.value = ytextB.toString();
        });

        elEditorB.addEventListener('input', () => {
            applyingB = true;
            ydocB.transact(() => {
                ytextB.delete(0, ytextB.length);
                ytextB.insert(0, elEditorB.value);
            }); // REMOVED wsB to allow update trigger
            applyingB = false;
        });

        // -------------------------------------------------------------
        // Cursor Presence Triggering
        // -------------------------------------------------------------
        const sendPresence = (ws, userName, cursorIdx) => {
            const presenceInfo = {
                user: userName,
                cursor: cursorIdx,
                color: userName === "Alice" ? "#a78bfa" : "#22d3ee"
            };
            const bytes = new TextEncoder().encode(JSON.stringify(presenceInfo));
            const message = new Uint8Array(1 + bytes.length);
            message[0] = 0x01;
            message.set(bytes, 1);
            if (ws.readyState === WebSocket.OPEN) {
                ws.send(message);
            }
        };

        // Listen for cursor changes in Alice's textarea
        ['keyup', 'click', 'focus'].forEach(event => {
            elEditorA.addEventListener(event, () => {
                const index = elEditorA.selectionStart;
                document.getElementById("presenceA").innerText = `Cursor: ${index}`;
                sendPresence(wsA, "Alice", index);
            });
        });

        // Listen for cursor changes in Bob's textarea
        ['keyup', 'click', 'focus'].forEach(event => {
            elEditorB.addEventListener(event, () => {
                const index = elEditorB.selectionStart;
                document.getElementById("presenceB").innerText = `Cursor: ${index}`;
                sendPresence(wsB, "Bob", index);
            });
        });

        // -------------------------------------------------------------
        // Trigger AI Co-Editor HTTP Request
        // -------------------------------------------------------------
        elBtnAI.addEventListener('click', async () => {
            const promptVal = elPrompt.value;
            elBtnAI.innerText = "Triggering...";
            elBtnAI.disabled = true;

            try {
                const response = await fetch(HTTP_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: promptVal })
                });
                const data = await response.json();
                console.log("[AI Response]", data);
            } catch (err) {
                console.error("AI trigger failed", err);
            } finally {
                elBtnAI.innerText = "Trigger AI Edit";
                elBtnAI.disabled = false;
            }
        });

    </script>
</body>
</html>
